<!DOCTYPE html>
<html>
<head>
<title>SuperGO Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background: linear-gradient(90deg,#0ea5e9,#2563eb);
    font-size:24px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* SEARCH */
input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    margin-bottom:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    margin-bottom:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* CARD HEADER */
.card-header{
    padding:15px;
    cursor:pointer;
    background: linear-gradient(90deg,#1e293b,#0f172a);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-header:hover{
    background:#1e293b;
}

.title{
    font-weight:bold;
    font-size:16px;
}

/* CARD BODY */
.card-body{
    display:none;
    padding:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* FIELD */
.field{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

.label{
    font-size:11px;
    color:#94a3b8;
}

.value{
    font-size:14px;
    font-weight:bold;
}

/* HIGHLIGHT */
mark{
    background:#00c6ff;
    color:black;
    padding:2px 4px;
    border-radius:4px;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">
SuperGO Monitoring System
</div>

<div class="container">

<input type="text" id="search" placeholder="Cari Key Req...">

<div id="output"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1pNRYXT72zR8TVWw40r26Ag9p7BDvGD8HzW09cKpE6QU/MONITORING";

let data=[];

fetch(url)
.then(res=>res.json())
.then(json=> data=json);

/* REALTIME SEARCH */
document.getElementById("search").addEventListener("input", searchData);

function highlight(text, keyword){
    if(!text) return "";
    const regex = new RegExp(`(${keyword})`, "gi");
    return text.toString().replace(regex, "<mark>$1</mark>");
}

function toggleCard(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

function searchData(){

const keyword=document.getElementById("search").value.toLowerCase().trim();
const output=document.getElementById("output");

if(!keyword){
    output.innerHTML="";
    return;
}

const results=data.filter(row=>
row["Key Req"] && row["Key Req"].toLowerCase().includes(keyword)
);

if(results.length===0){
    output.innerHTML="<div class='empty'>Data tidak ditemukan</div>";
    return;
}

let html="";

results.forEach((row,index)=>{

const headers=Object.keys(row);
const mainTitle = row["Key Req"] || "No Title";

html+=`
<div class="card">

<div class="card-header" onclick="toggleCard('card${index}')">
<div class="title">${highlight(mainTitle, keyword)}</div>
<div>▼</div>
</div>

<div class="card-body" id="card${index}">
<div class="grid">
`;

for(let i=1;i<=21;i++){

if(headers[i]){

html+=`
<div class="field">
<div class="label">${headers[i]}</div>
<div class="value">${highlight(row[headers[i]], keyword)}</div>
</div>
`;

}

}

html+=`
</div>
</div>
</div>
`;

});

output.innerHTML=html;

}

</script>

</body>
</html>
