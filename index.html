<!DOCTYPE html>
<html>
<head>
<title>SuperGO Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background: linear-gradient(90deg,#0ea5e9,#2563eb);
    font-size:24px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* SEARCH */
.search-box{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

/* RESULT COUNT */
.result-count{
    margin-bottom:15px;
    color:#94a3b8;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:fadeIn 0.3s ease;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* FIELD */
.field{
    margin-bottom:10px;
}

.label{
    font-size:12px;
    color:#94a3b8;
}

.value{
    font-size:15px;
    font-weight:bold;
}

/* HIGHLIGHT */
mark{
    background:#00c6ff;
    color:black;
    padding:2px 4px;
    border-radius:4px;
}

/* LOADING */
.loading{
    text-align:center;
    margin-top:20px;
}

.empty{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">
SuperGO Monitoring System
</div>

<div class="container">

<div class="search-box">
<input type="text" id="search" placeholder="Ketik Key Req... (realtime)">
</div>

<div id="loading" class="loading">Loading data...</div>
<div id="resultCount" class="result-count"></div>
<div id="output"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1pNRYXT72zR8TVWw40r26Ag9p7BDvGD8HzW09cKpE6QU/MONITORING";

let data=[];

fetch(url)
.then(res=>res.json())
.then(json=>{
    data=json;
    document.getElementById("loading").style.display="none";
});

/* REALTIME SEARCH */
document.getElementById("search").addEventListener("input", searchData);

function highlight(text, keyword){
    if(!text) return "";
    const regex = new RegExp(`(${keyword})`, "gi");
    return text.toString().replace(regex, "<mark>$1</mark>");
}

function searchData(){

const keyword=document.getElementById("search").value.toLowerCase().trim();
const output=document.getElementById("output");
const resultCount=document.getElementById("resultCount");

if(!keyword){
    output.innerHTML="";
    resultCount.innerHTML="";
    return;
}

const results=data.filter(row=>
row["Key Req"] && row["Key Req"].toLowerCase().includes(keyword)
);

if(results.length===0){
    output.innerHTML="<div class='empty'>Data tidak ditemukan</div>";
    resultCount.innerHTML="";
    return;
}

resultCount.innerHTML="Ditemukan "+results.length+" data";

let html="";

results.forEach(row=>{

const headers=Object.keys(row);

html+="<div class='card'>";

for(let i=1;i<=21;i++){

if(headers[i]){

html+=`
<div class="field">
<div class="label">${headers[i]}</div>
<div class="value">${highlight(row[headers[i]], keyword)}</div>
</div>
`;

}

}

html+="</div>";

});

output.innerHTML=html;

}

</script>

</body>
</html>
