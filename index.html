<!DOCTYPE html>
<html>
<head>
<title>SuperGO Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.header{
    padding:20px;
    text-align:center;
    background: linear-gradient(90deg,#0ea5e9,#2563eb);
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    margin-bottom:10px;
}

/* BUTTON */
.btn{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#f59e0b;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    margin-bottom:15px;
    overflow:hidden;
}

.card-header{
    padding:15px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1e293b;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.open{ background:#dc2626; }
.close{ background:#16a34a; }
.progress{ background:#f59e0b; }

.card-body{
    display:none;
    padding:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.field{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

.label{
    font-size:11px;
    color:#94a3b8;
}

.value{
    font-size:14px;
    font-weight:bold;
}

mark{
    background:#00c6ff;
    color:black;
}

.group-title{
    margin:20px 0 10px;
    font-weight:bold;
    color:#38bdf8;
}

.empty{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">SuperGO Monitoring Dashboard</div>

<div class="container">

<input type="text" id="search" placeholder="Cari Key Req...">

<button class="btn" onclick="findDuplicate()">Cek Data Double</button>

<div id="output"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1pNRYXT72zR8TVWw40r26Ag9p7BDvGD8HzW09cKpE6QU/MONITORING";

let data=[];
let keyColumn="";
let statusColumn="";

/* LOAD DATA */
fetch(url)
.then(res=>res.json())
.then(json=>{
    data=json;

    const headers=Object.keys(data[0]);

    headers.forEach(h=>{
        const name=h.toLowerCase().trim();

        if(name.includes("key")) keyColumn=h;
        if(name.includes("status")) statusColumn=h;
    });
});

/* SEARCH */
document.getElementById("search").addEventListener("input", searchData);

function getStatusClass(status){
if(!status) return "";
status=status.toString().toLowerCase();

if(status.includes("open")) return "open";
if(status.includes("close")) return "close";
if(status.includes("progress")) return "progress";

return "";
}

function toggleCard(id){
const el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none":"block";
}

function highlight(text, keyword){
if(!text) return "";
const regex = new RegExp(`(${keyword})`, "gi");
return text.toString().replace(regex, "<mark>$1</mark>");
}

function searchData(){

const keyword=document.getElementById("search").value.toLowerCase().trim();
const output=document.getElementById("output");

if(!keyword){
output.innerHTML="";
return;
}

const results=data.filter(row=>{
const keyVal=row[keyColumn];
return keyVal && keyVal.toString().toLowerCase().includes(keyword);
});

if(results.length===0){
output.innerHTML="<div class='empty'>Data tidak ditemukan</div>";
return;
}

renderCards(results, keyword);

}

/* DUPLICATE LOGIC */
function getKeyBase(value){
if(!value) return "";
const clean=value.toString().replace(/[^0-9]/g,"");
return clean.substring(0,6);
}

function findDuplicate(){

const output=document.getElementById("output");

let groups={};

data.forEach(row=>{

const keyVal=row[keyColumn];
const base=getKeyBase(keyVal);

if(!base) return;

if(!groups[base]) groups[base]=[];

groups[base].push(row);

});

let duplicates=Object.keys(groups).filter(k=>groups[k].length>1);

if(duplicates.length===0){
output.innerHTML="<div class='empty'>Tidak ada data double</div>";
return;
}

let html="";

duplicates.forEach((base,i)=>{

html+=`<div class="group-title">Group: ${base}</div>`;

groups[base].forEach((row,index)=>{
html+=createCard(row, `dup${i}_${index}`, "");
});

});

output.innerHTML=html;

}

/* RENDER CARD */
function renderCards(rows, keyword){
const output=document.getElementById("output");

let html="";

rows.forEach((row,i)=>{
html+=createCard(row, "s"+i, keyword);
});

output.innerHTML=html;
}

function createCard(row,id,keyword){

const headers=Object.keys(row);
const status=row[statusColumn] || "";

let html=`
<div class="card">

<div class="card-header" onclick="toggleCard('${id}')">
<div>${highlight(row[keyColumn], keyword)}</div>
<div class="status ${getStatusClass(status)}">${status || "-"}</div>
</div>

<div class="card-body" id="${id}">
<div class="grid">
`;

headers.forEach(h=>{
html+=`
<div class="field">
<div class="label">${h}</div>
<div class="value">${row[h] || "-"}</div>
</div>
`;
});

html+=`
</div>
</div>
</div>
`;

return html;

}

</script>

</body>
</html>
