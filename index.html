<!DOCTYPE html>
<html>
<head>
<title>SuperGO Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background: linear-gradient(90deg,#0ea5e9,#2563eb);
    font-size:24px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* FILTER BAR */
.filter-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

input, select{
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:14px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    margin-bottom:15px;
    overflow:hidden;
}

/* HEADER CARD */
.card-header{
    padding:15px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1e293b;
}

/* STATUS BADGE */
.status{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

/* COLOR STATUS */
.open{ background:#dc2626; }
.close{ background:#16a34a; }
.progress{ background:#f59e0b; }

/* BODY */
.card-body{
    display:none;
    padding:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.field{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

.label{
    font-size:11px;
    color:#94a3b8;
}

.value{
    font-size:14px;
    font-weight:bold;
}

/* HIGHLIGHT */
mark{
    background:#00c6ff;
    color:black;
}

.empty{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">SuperGO Monitoring Dashboard</div>

<div class="container">

<div class="filter-bar">

<input type="text" id="search" placeholder="Cari Key Req...">

<select id="statusFilter">
<option value="">All Status</option>
<option value="open">Open</option>
<option value="close">Close</option>
<option value="progress">Progress</option>
</select>

<select id="picFilter">
<option value="">All PIC</option>
</select>

</div>

<div id="output"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1pNRYXT72zR8TVWw40r26Ag9p7BDvGD8HzW09cKpE6QU/MONITORING";

let data=[];

fetch(url)
.then(res=>res.json())
.then(json=>{
    data=json;
    initPIC();
});

/* INIT PIC FILTER */
function initPIC(){

const picSet=new Set();

data.forEach(row=>{
    if(row["PIC"]) picSet.add(row["PIC"]);
});

const picFilter=document.getElementById("picFilter");

picSet.forEach(pic=>{
    picFilter.innerHTML += `<option value="${pic}">${pic}</option>`;
});

}

/* EVENT */
document.getElementById("search").addEventListener("input", searchData);
document.getElementById("statusFilter").addEventListener("change", searchData);
document.getElementById("picFilter").addEventListener("change", searchData);

function getStatusClass(status){

if(!status) return "";

status=status.toLowerCase();

if(status.includes("open")) return "open";
if(status.includes("close")) return "close";
if(status.includes("progress")) return "progress";

return "";
}

function toggleCard(id){
const el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none":"block";
}

function highlight(text, keyword){
if(!text) return "";
const regex = new RegExp(`(${keyword})`, "gi");
return text.toString().replace(regex, "<mark>$1</mark>");
}

function searchData(){

const keyword=document.getElementById("search").value.toLowerCase();
const statusFilter=document.getElementById("statusFilter").value;
const picFilter=document.getElementById("picFilter").value;

const output=document.getElementById("output");

let results=data.filter(row=>{

let matchKey = row["Key Req"] && row["Key Req"].toLowerCase().includes(keyword);

let matchStatus = !statusFilter || (row["STATUS"] && row["STATUS"].toLowerCase().includes(statusFilter));

let matchPIC = !picFilter || row["PIC"]===picFilter;

return matchKey && matchStatus && matchPIC;

});

if(results.length===0){
output.innerHTML="<div class='empty'>Data tidak ditemukan</div>";
return;
}

let html="";

results.forEach((row,i)=>{

const headers=Object.keys(row);
const status=row["STATUS"] || "";

html+=`
<div class="card">

<div class="card-header" onclick="toggleCard('c${i}')">

<div>${highlight(row["Key Req"], keyword)}</div>

<div class="status ${getStatusClass(status)}">
${status}
</div>

</div>

<div class="card-body" id="c${i}">
<div class="grid">
`;

for(let i=1;i<headers.length;i++){

html+=`
<div class="field">
<div class="label">${headers[i]}</div>
<div class="value">${row[headers[i]]}</div>
</div>
`;

}

html+=`
</div>
</div>
</div>
`;

});

output.innerHTML=html;

}

</script>

</body>
</html>
