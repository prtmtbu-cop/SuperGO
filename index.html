<!DOCTYPE html>
<html>
<head>
<title>SuperGO Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.header{
    padding:20px;
    text-align:center;
    background: linear-gradient(90deg,#0ea5e9,#2563eb);
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    margin-bottom:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    margin-bottom:15px;
    overflow:hidden;
}

.card-header{
    padding:15px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1e293b;
}

/* STATUS */
.status{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.open{ background:#dc2626; }
.close{ background:#16a34a; }
.progress{ background:#f59e0b; }

/* BODY */
.card-body{
    display:none;
    padding:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.field{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

.label{
    font-size:11px;
    color:#94a3b8;
}

.value{
    font-size:14px;
    font-weight:bold;
}

mark{
    background:#00c6ff;
    color:black;
}

.empty{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">SuperGO Monitoring Dashboard</div>

<div class="container">

<input type="text" id="search" placeholder="Cari Key Req...">

<div id="output"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1pNRYXT72zR8TVWw40r26Ag9p7BDvGD8HzW09cKpE6QU/MONITORING";

let data=[];

/* 🔥 AUTO DETECT KOLOM */
let keyColumn="";
let statusColumn="";
let picColumn="";

fetch(url)
.then(res=>res.json())
.then(json=>{
    data=json;

    const headers=Object.keys(data[0]);

    headers.forEach(h=>{
        const name=h.toLowerCase().trim();

        if(name.includes("key")) keyColumn=h;
        if(name.includes("status")) statusColumn=h;
        if(name.includes("pic")) picColumn=h;
    });

});

/* REALTIME SEARCH */
document.getElementById("search").addEventListener("input", searchData);

function getStatusClass(status){

if(!status) return "";

status=status.toLowerCase();

if(status.includes("open")) return "open";
if(status.includes("close")) return "close";
if(status.includes("progress")) return "progress";

return "";
}

function toggleCard(id){
const el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none":"block";
}

function highlight(text, keyword){
if(!text) return "";
const regex = new RegExp(`(${keyword})`, "gi");
return text.toString().replace(regex, "<mark>$1</mark>");
}

function searchData(){

const keyword=document.getElementById("search").value.toLowerCase().trim();
const output=document.getElementById("output");

if(!keyword){
output.innerHTML="";
return;
}

const results=data.filter(row=>{
const keyVal = row[keyColumn];
return keyVal && keyVal.toLowerCase().includes(keyword);
});

if(results.length===0){
output.innerHTML="<div class='empty'>Data tidak ditemukan</div>";
return;
}

let html="";

results.forEach((row,i)=>{

const headers=Object.keys(row);
const status=row[statusColumn] || "";

html+=`
<div class="card">

<div class="card-header" onclick="toggleCard('c${i}')">

<div>${highlight(row[keyColumn], keyword)}</div>

<div class="status ${getStatusClass(status)}">
${status || "-"}
</div>

</div>

<div class="card-body" id="c${i}">
<div class="grid">
`;

headers.forEach(h=>{
html+=`
<div class="field">
<div class="label">${h}</div>
<div class="value">${row[h] || "-"}</div>
</div>
`;
});

html+=`
</div>
</div>
</div>
`;

});

output.innerHTML=html;

}

</script>

</body>
</html>
